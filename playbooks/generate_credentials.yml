---
- name: Generate VM credentials
  hosts: localhost
  gather_facts: false

  vars:
    num_vms: 3
    vm_base_id: 110
    credentials_file: "../outputs/dev_credentials.csv"

  tasks:
    - name: Generate VM credentials
      ansible.builtin.set_fact:
        vm_credentials: "{{ vm_credentials | default([]) + [new_cred] }}"
      loop: "{{ range(0, num_vms) | list }}"
      loop_control:
        loop_var: loop_counter
      vars:
        vm_id: "{{ vm_base_id + loop_counter + 1 }}"
        new_cred:
          vmid: "{{ vm_id }}"
          username: "dev{{ vm_id }}"
          password: "{{ lookup('password', '/dev/null length=16 chars=ascii_letters,digits') }}"
          email: "dev{{ vm_id }}@homelab.local"

    - name: Display credentials
      ansible.builtin.debug:
        msg: "Generated {{ vm_credentials | length }} credentials - saved to {{ credentials_file }}"

    - name: Save credentials to CSV file
      ansible.builtin.copy:
        content: |
          vmid,username,password,email
          {% for cred in vm_credentials %}
          {{ cred.vmid }},{{ cred.username }},{{ cred.password }},{{ cred.email }}
          {% endfor %}
        dest: "{{ credentials_file }}"
        mode: '0600'
